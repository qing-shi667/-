<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛顿环测曲率半径-含完整不确定度</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
            background-color: #f5f7fa;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        .input-section {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin: 10px 0 5px;
            color: #34495e;
            font-weight: bold;
        }
        input, textarea, button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            margin: 5px 5px 5px 0;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button.secondary {
            background-color: #95a5a6;
        }
        button.secondary:hover {
            background-color: #7f8c8d;
        }
        textarea {
            width: 100%;
            height: 120px;
            resize: vertical;
            font-family: monospace;
        }
        .image-import-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin: 8px 0 10px;
        }
        .file-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            margin: 0;
            padding: 10px 14px;
            border-radius: 5px;
            color: white;
            background: #3498db;
            font-weight: normal;
            cursor: pointer;
        }
        .file-action.secondary {
            color: #34495e;
            border: 1px solid #ccd6e0;
            background: white;
        }
        .image-import-actions button {
            margin: 0;
            white-space: nowrap;
        }
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .image-preview {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #d8e0e8;
            border-radius: 5px;
            background: #f8fafc;
        }
        .image-preview img {
            display: block;
            width: 100%;
            max-height: 260px;
            object-fit: contain;
        }
        .image-preview figcaption {
            margin-top: 8px;
            overflow-wrap: anywhere;
            color: #5d6d7e;
            font-size: 12px;
        }
        .vision-status {
            min-height: 20px;
            margin: 0 0 8px;
            color: #5d6d7e;
            font-size: 13px;
            line-height: 1.5;
        }
        .vision-status.success {
            color: #1e8449;
        }
        .vision-status.error {
            color: #b03a2e;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4fd;
            border-radius: 5px;
            line-height: 1.8;
        }
        .canvas-container {
            margin-top: 20px;
            position: relative;
            height: 400px;
        }
        @media (max-width: 600px) {
            body {
                margin: 0 auto;
                padding: 10px;
            }
            .container {
                padding: 16px;
                border-radius: 6px;
            }
            h1 {
                margin-bottom: 22px;
                font-size: 26px;
                line-height: 1.35;
            }
            .input-section {
                margin-bottom: 20px;
            }
            .image-import-actions {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }
            .image-import-actions button {
                grid-column: 1 / -1;
                width: 100%;
            }
            textarea {
                height: 190px;
            }
            .canvas-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>牛顿环曲率半径测量 & 全自动不确定度评定</h1>
        <div class="input-section">
            <label for="lambda">入射光波长 λ (nm)：</label>
            <input type="number" id="lambda" value="589.3" step="0.1">
            <p style="font-size:12px;color:#666;">钠黄光默认 589.3 nm</p>
        </div>
        <div class="input-section">
            <label for="deltaInst">仪器最大允许误差 (mm)：</label>
            <input type="number" id="deltaInst" value="0.004" step="0.001">
            <p style="font-size:12px;color:#666;">读数显微镜常用 0.004mm</p>
        </div>
        <div class="input-section">
            <label for="dataInput">实验数据：环级数k 暗环直径d(mm)</label>
            <div class="image-import-actions">
                <label class="file-action" for="cameraInput">拍照</label>
                <input class="visually-hidden" id="cameraInput" type="file" accept="image/*" capture="environment">
                <label class="file-action secondary" for="imageFileInput">选择图片</label>
                <input class="visually-hidden" id="imageFileInput" type="file" accept="image/jpeg,image/png,image/webp">
                <button id="visionButton" type="button" disabled>AI识别并填入</button>
            </div>
            <figure class="image-preview" id="imagePreviewWrap" hidden>
                <img id="imagePreview" alt="待识别实验数据图片">
                <figcaption id="imageFileName"></figcaption>
            </figure>
            <div id="visionStatus" class="vision-status" aria-live="polite"></div>
            <textarea id="dataInput" placeholder="每行一组 k d">10 7.02
11 7.38
12 7.70
13 8.00
14 8.28
15 8.54
16 8.80
17 9.04
18 9.28
19 9.50</textarea>
        </div>
        <div class="input-section">
            <button onclick="runFit()">开始计算+不确定度</button>
            <button class="secondary" onclick="clearAll()">清空</button>
        </div>
        <div id="result"></div>
        <div class="canvas-container">
            <canvas id="fitChart"></canvas>
        </div>
    </div>

    <script>
        let myChart = null;
        // 最小二乘线性拟合
        function linearRegression(x, y) {
            const n = x.length;
            let sumX=0,sumY=0,sumXY=0,sumX2=0,sumY2=0;
            for(let i=0;i<n;i++){
                sumX+=x[i]; sumY+=y[i]; sumXY+=x[i]*y[i]; sumX2+=x[i]*x[i]; sumY2+=y[i]*y[i];
            }
            const slope = (n*sumXY - sumX*sumY)/(n*sumX2 - sumX*sumX);
            const intercept = (sumY - slope*sumX)/n;
            const r = (n*sumXY-sumX*sumY)/Math.sqrt((n*sumX2-sumX*sumX)*(n*sumY2-sumY*sumY));
            
            // 残差
            let residSum=0;
            for(let i=0;i<n;i++){
                residSum += Math.pow(y[i]-(slope*x[i]+intercept),2);
            }
            const sigma = Math.sqrt(residSum/(n-2));
            const sb = sigma / Math.sqrt(n*sumX2 - sumX*sumX);
            return {slope,intercept,r,sb};
        }

        function runFit(){
            const lambda_nm = parseFloat(document.getElementById('lambda').value);
            const deltaInst = parseFloat(document.getElementById('deltaInst').value);
            const lambda_mm = lambda_nm * 1e-6;

            const dataStr = document.getElementById('dataInput').value.trim();
            if(!dataStr){alert('请输入实验数据');return;}
            const lines = dataStr.split('\n').filter(t=>t.trim());
            const k=[],d=[];
            let ok=true;
            for(let line of lines){
                let p = line.trim().split(/\s+/);
                if(p.length!==2){ok=false;break;}
                let ki=parseFloat(p[0]),di=parseFloat(p[1]);
                if(isNaN(ki)||isNaN(di)){ok=false;break;}
                k.push(ki);d.push(di);
            }
            if(!ok||k.length<3){alert('数据格式错误或组数太少');return;}

            // 计算 r²
            const r = d.map(x=>x/2);
            const y = r.map(ri=>ri*ri);
            const x = k;

            const fit = linearRegression(x,y);
            const b = fit.slope;
            const sb = fit.sb;
            const rCorr = fit.r;

            // 曲率半径
            const R_mm = b / lambda_mm;
            // A类不确定度 由斜率传递
            const uA_R = sb / lambda_mm;
            // B类不确定度 仪器误差均匀分布
            const uB = deltaInst / Math.sqrt(3);
            // 合成标准不确定度 简化合成
            const uC_R = Math.sqrt(uA_R*uA_R + uB*uB);
            // 扩展不确定度 取包含因子k=2
            const U_R = 2 * uC_R;

            const R_m = R_mm / 1000;
            const U_m = U_R / 1000;

            // 输出全部结果
            document.getElementById('result').innerHTML = `
            <strong>📊 拟合与不确定度完整结果</strong><br>
            波长 λ = ${lambda_nm.toFixed(1)} nm<br>
            拟合方程：r² = ${b.toFixed(4)}k + ${fit.intercept.toFixed(4)}<br>
            相关系数 r = ${rCorr.toFixed(6)}<br>
            斜率标准不确定度 u(b) = ${sb.toFixed(6)} mm²<br>
            <hr>
            曲率半径 R = ${R_mm.toFixed(2)} mm = ${R_m.toFixed(3)} m<br>
            A类不确定度 u_A = ${uA_R.toFixed(3)} mm<br>
            B类不确定度 u_B = ${uB.toFixed(3)} mm<br>
            合成标准不确定度 u_C = ${uC_R.toFixed(3)} mm<br>
            扩展不确定度 U = ${U_R.toFixed(3)} mm<br>
            <hr>
            最终结果：<strong>R = (${R_m.toFixed(3)} ± ${U_m.toFixed(3)}) m</strong>  (k=2)
            `;

            // 绘图
            const ctx = document.getElementById('fitChart').getContext('2d');
            if(myChart) myChart.destroy();
            const fitY = x.map(xi=>b*xi+fit.intercept);
            myChart = new Chart(ctx,{
                type:'scatter',
                data:{
                    datasets:[
                        {
                            label:'实验数据(k, r²)',
                            data:x.map((xi,i)=>({x:xi,y:y[i]})),
                            backgroundColor:'#e74c3c',pointRadius:6
                        },
                        {
                            label:'拟合直线',
                            type:'line',
                            data:x.map((xi,i)=>({x:xi,y:fitY[i]})),
                            borderColor:'#3498db',borderWidth:2,fill:false,pointRadius:0
                        }
                    ]
                },
                options:{
                    responsive:true,maintainAspectRatio:false,
                    scales:{
                        x:{title:{display:true,text:'环级数 k'}},
                        y:{title:{display:true,text:'r² (mm²)'}}
                    }
                }
            });
        }

        function clearAll(){
            document.getElementById('dataInput').value='';
            document.getElementById('lambda').value=589.3;
            document.getElementById('deltaInst').value=0.004;
            document.getElementById('result').innerHTML='';
            if(myChart){myChart.destroy();myChart=null;}
        }
    </script>
</body>
</html>
