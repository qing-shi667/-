<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛顿环曲率半径测量</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --panel: #ffffff;
            --text: #243447;
            --muted: #657487;
            --line: #d8e0ea;
            --primary: #2478c7;
            --primary-dark: #1d63a5;
            --accent: #1f9d77;
            --warn: #b86b00;
            --soft: #edf6ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
        }

        main {
            max-width: 980px;
            margin: 0 auto;
            background: var(--panel);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 8px 28px rgba(31, 48, 71, 0.10);
        }

        h1 {
            margin: 8px 0 28px;
            color: #24384f;
            text-align: center;
            font-size: clamp(28px, 4vw, 42px);
            letter-spacing: 0;
        }

        h2 {
            margin: 28px 0 12px;
            font-size: 20px;
            color: #253d59;
        }

        label {
            display: block;
            margin: 12px 0 6px;
            color: #2d4560;
            font-weight: 700;
        }

        input,
        textarea,
        button {
            font: inherit;
        }

        input[type="number"],
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            color: var(--text);
            padding: 11px 12px;
            outline: none;
        }

        input[type="number"] {
            max-width: 260px;
        }

        input[type="number"]:focus,
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(36, 120, 199, 0.14);
        }

        textarea {
            min-height: 168px;
            resize: vertical;
            font-family: Consolas, "Courier New", monospace;
            line-height: 1.5;
        }

        button,
        .file-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            gap: 8px;
            border: 0;
            border-radius: 6px;
            padding: 10px 15px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            text-decoration: none;
            user-select: none;
        }

        button:hover,
        .file-button:hover {
            background: var(--primary-dark);
        }

        button:active,
        .file-button:active {
            transform: translateY(1px);
        }

        button.secondary {
            background: #8797a1;
        }

        button.secondary:hover {
            background: #74838d;
        }

        button.success {
            background: var(--accent);
        }

        button.success:hover {
            background: #177e5f;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.58;
        }

        .hint {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 22px;
        }

        .section {
            margin-bottom: 24px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin: 12px 0;
        }

        .ocr-layout {
            display: grid;
            grid-template-columns: minmax(260px, 360px) 1fr;
            gap: 18px;
            align-items: start;
        }

        .preview {
            width: 100%;
            min-height: 220px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #f9fbfd;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .preview img,
        .preview video {
            width: 100%;
            height: 100%;
            max-height: 360px;
            object-fit: contain;
            display: block;
        }

        .preview span {
            color: var(--muted);
        }

        .status {
            min-height: 42px;
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            background: var(--soft);
            color: #28557a;
            line-height: 1.5;
        }

        .status.error {
            background: #fff1ef;
            color: #9c2f23;
        }

        .status.warn {
            background: #fff7e8;
            color: var(--warn);
        }

        .ocr-text {
            min-height: 104px;
            background: #fbfdff;
        }

        .checkbox-row {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            color: var(--muted);
        }

        .checkbox-row input {
            width: 18px;
            height: 18px;
        }

        #cameraCanvas,
        #photoInput {
            display: none;
        }

        #result {
            min-height: 42px;
            margin-top: 20px;
            padding: 15px;
            background: var(--soft);
            border-radius: 6px;
            line-height: 1.8;
        }

        .canvas-container {
            position: relative;
            height: 400px;
            margin-top: 20px;
        }

        @media (max-width: 760px) {
            body {
                padding: 12px;
            }

            main {
                padding: 20px;
            }

            .grid,
            .ocr-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main>
    <h1>牛顿环曲率半径测量 & 全自动不确定度评定</h1>

    <section class="grid section">
        <div>
            <label for="lambda">入射光波长 λ (nm)：</label>
            <input type="number" id="lambda" value="589.3" step="0.1">
            <p class="hint">钠黄光默认 589.3 nm</p>
        </div>
        <div>
            <label for="deltaInst">仪器最大允许误差 (mm)：</label>
            <input type="number" id="deltaInst" value="0.004" step="0.001">
            <p class="hint">读数显微镜常用 0.004 mm</p>
        </div>
    </section>

    <section class="section">
        <h2>拍照识别</h2>
        <div class="ocr-layout">
            <div>
                <div id="preview" class="preview"><span>照片预览</span></div>
                <canvas id="cameraCanvas"></canvas>
            </div>
            <div>
                <div class="toolbar">
                    <label class="file-button" for="photoInput">选择照片</label>
                    <input id="photoInput" type="file" accept="image/*" capture="environment">
                    <button type="button" id="cameraBtn" class="secondary">打开摄像头</button>
                    <button type="button" id="snapBtn" class="success" disabled>拍照识别</button>
                </div>
                <label class="checkbox-row">
                    <input type="checkbox" id="appendMode">
                    追加到现有数据
                </label>
                <label for="ocrRawText">OCR文本</label>
                <textarea id="ocrRawText" class="ocr-text" readonly></textarea>
                <div id="ocrStatus" class="status">本地 OCR 服务待连接</div>
            </div>
        </div>
    </section>

    <section class="section">
        <label for="dataInput">实验数据：环级数 k 暗环直径 d (mm)</label>
        <textarea id="dataInput" placeholder="每行一组 k d">10 7.02
11 7.38
12 7.70
13 8.00
14 8.28
15 8.54
16 8.80
17 9.04
18 9.28
19 9.50</textarea>
    </section>

    <section class="section">
        <div class="toolbar">
            <button type="button" onclick="runFit()">开始计算+不确定度</button>
            <button type="button" class="secondary" onclick="clearAll()">清空</button>
        </div>
        <div id="result"></div>
        <div class="canvas-container">
            <canvas id="fitChart"></canvas>
        </div>
    </section>
</main>

<script>
let myChart = null;
let activeStream = null;
const OCR_API_BASE = ["127.0.0.1", "localhost"].includes(window.location.hostname)
    ? ""
    : "http://127.0.0.1:6677";

const els = {
    dataInput: document.getElementById("dataInput"),
    photoInput: document.getElementById("photoInput"),
    preview: document.getElementById("preview"),
    cameraBtn: document.getElementById("cameraBtn"),
    snapBtn: document.getElementById("snapBtn"),
    cameraCanvas: document.getElementById("cameraCanvas"),
    ocrRawText: document.getElementById("ocrRawText"),
    ocrStatus: document.getElementById("ocrStatus"),
    appendMode: document.getElementById("appendMode")
};

function setOcrStatus(message, type = "") {
    els.ocrStatus.textContent = message;
    els.ocrStatus.className = `status ${type}`.trim();
}

function linearRegression(x, y) {
    const n = x.length;
    let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;
    for (let i = 0; i < n; i++) {
        sumX += x[i];
        sumY += y[i];
        sumXY += x[i] * y[i];
        sumX2 += x[i] * x[i];
        sumY2 += y[i] * y[i];
    }
    const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
    const intercept = (sumY - slope * sumX) / n;
    const r = (n * sumXY - sumX * sumY) /
        Math.sqrt((n * sumX2 - sumX * sumX) * (n * sumY2 - sumY * sumY));

    let residSum = 0;
    for (let i = 0; i < n; i++) {
        residSum += Math.pow(y[i] - (slope * x[i] + intercept), 2);
    }
    const sigma = Math.sqrt(residSum / (n - 2));
    const sb = sigma / Math.sqrt(n * sumX2 - sumX * sumX);
    return { slope, intercept, r, sb };
}

function runFit() {
    const lambdaNm = parseFloat(document.getElementById("lambda").value);
    const deltaInst = parseFloat(document.getElementById("deltaInst").value);
    const lambdaMm = lambdaNm * 1e-6;
    const dataStr = els.dataInput.value.trim();

    if (!dataStr) {
        alert("请输入实验数据");
        return;
    }

    const lines = dataStr.split("\n").filter(t => t.trim());
    const k = [];
    const d = [];
    let ok = true;
    for (const line of lines) {
        const p = line.trim().split(/\s+/);
        if (p.length !== 2) {
            ok = false;
            break;
        }
        const ki = parseFloat(p[0]);
        const di = parseFloat(p[1]);
        if (Number.isNaN(ki) || Number.isNaN(di)) {
            ok = false;
            break;
        }
        k.push(ki);
        d.push(di);
    }
    if (!ok || k.length < 3) {
        alert("数据格式错误或组数太少");
        return;
    }

    const radius = d.map(value => value / 2);
    const y = radius.map(value => value * value);
    const x = k;
    const fit = linearRegression(x, y);
    const b = fit.slope;
    const sb = fit.sb;
    const rCorr = fit.r;

    const Rmm = b / lambdaMm;
    const uAR = sb / lambdaMm;
    const uB = deltaInst / Math.sqrt(3);
    const uCR = Math.sqrt(uAR * uAR + uB * uB);
    const UR = 2 * uCR;
    const Rm = Rmm / 1000;
    const Um = UR / 1000;

    document.getElementById("result").innerHTML = `
        <strong>拟合与不确定度完整结果</strong><br>
        波长 λ = ${lambdaNm.toFixed(1)} nm<br>
        拟合方程：r² = ${b.toFixed(4)}k + ${fit.intercept.toFixed(4)}<br>
        相关系数 r = ${rCorr.toFixed(6)}<br>
        斜率标准不确定度 u(b) = ${sb.toFixed(6)} mm²<br>
        <hr>
        曲率半径 R = ${Rmm.toFixed(2)} mm = ${Rm.toFixed(3)} m<br>
        A类不确定度 u_A = ${uAR.toFixed(3)} mm<br>
        B类不确定度 u_B = ${uB.toFixed(3)} mm<br>
        合成标准不确定度 u_C = ${uCR.toFixed(3)} mm<br>
        扩展不确定度 U = ${UR.toFixed(3)} mm<br>
        <hr>
        最终结果：<strong>R = (${Rm.toFixed(3)} ± ${Um.toFixed(3)}) m</strong> (k=2)
    `;

    const ctx = document.getElementById("fitChart").getContext("2d");
    if (myChart) myChart.destroy();
    const fitY = x.map(xi => b * xi + fit.intercept);
    myChart = new Chart(ctx, {
        type: "scatter",
        data: {
            datasets: [
                {
                    label: "实验数据(k, r²)",
                    data: x.map((xi, i) => ({ x: xi, y: y[i] })),
                    backgroundColor: "#d95d39",
                    pointRadius: 6
                },
                {
                    label: "拟合直线",
                    type: "line",
                    data: x.map((xi, i) => ({ x: xi, y: fitY[i] })),
                    borderColor: "#2478c7",
                    borderWidth: 2,
                    fill: false,
                    pointRadius: 0
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { title: { display: true, text: "环级数 k" } },
                y: { title: { display: true, text: "r² (mm²)" } }
            }
        }
    });
}

function clearAll() {
    els.dataInput.value = "";
    els.ocrRawText.value = "";
    document.getElementById("lambda").value = 589.3;
    document.getElementById("deltaInst").value = 0.004;
    document.getElementById("result").innerHTML = "";
    setOcrStatus("本地 OCR 服务待连接");
    if (myChart) {
        myChart.destroy();
        myChart = null;
    }
}

function renderImagePreview(dataUrl) {
    els.preview.innerHTML = "";
    const img = document.createElement("img");
    img.alt = "OCR照片预览";
    img.src = dataUrl;
    els.preview.appendChild(img);
}

function importPairs(pairs) {
    const text = pairs.map(pair => `${pair.k} ${pair.d}`).join("\n");
    if (!text) return;
    if (els.appendMode.checked && els.dataInput.value.trim()) {
        els.dataInput.value = `${els.dataInput.value.trim()}\n${text}`;
    } else {
        els.dataInput.value = text;
    }
}

async function recognizeImage(dataUrl) {
    setOcrStatus("正在识别...");
    try {
        const response = await fetch(`${OCR_API_BASE}/api/ocr`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: dataUrl })
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
            throw new Error(payload.error || "OCR服务返回异常");
        }

        els.ocrRawText.value = payload.text || "";
        if (payload.pairs && payload.pairs.length) {
            importPairs(payload.pairs);
            setOcrStatus(`已导入 ${payload.pairs.length} 组数据`);
        } else {
            setOcrStatus("未识别到成组的 k d 数据", "warn");
        }
    } catch (error) {
        setOcrStatus(`OCR失败：${error.message}`, "error");
    }
}

function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
    });
}

els.photoInput.addEventListener("change", async () => {
    const file = els.photoInput.files && els.photoInput.files[0];
    if (!file) return;
    const dataUrl = await readFileAsDataUrl(file);
    renderImagePreview(dataUrl);
    await recognizeImage(dataUrl);
});

els.cameraBtn.addEventListener("click", async () => {
    if (activeStream) {
        activeStream.getTracks().forEach(track => track.stop());
        activeStream = null;
        els.cameraBtn.textContent = "打开摄像头";
        els.snapBtn.disabled = true;
        els.preview.innerHTML = "<span>照片预览</span>";
        return;
    }

    try {
        activeStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } },
            audio: false
        });
        els.preview.innerHTML = "";
        const video = document.createElement("video");
        video.autoplay = true;
        video.playsInline = true;
        video.srcObject = activeStream;
        els.preview.appendChild(video);
        els.cameraBtn.textContent = "关闭摄像头";
        els.snapBtn.disabled = false;
        setOcrStatus("摄像头已打开");
    } catch (error) {
        setOcrStatus(`无法打开摄像头：${error.message}`, "error");
    }
});

els.snapBtn.addEventListener("click", async () => {
    const video = els.preview.querySelector("video");
    if (!video || !video.videoWidth) return;

    const canvas = els.cameraCanvas;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
    renderImagePreview(dataUrl);
    await recognizeImage(dataUrl);
});

async function checkOcrService() {
    try {
        const response = await fetch(`${OCR_API_BASE}/api/health`);
        const payload = await response.json();
        if (payload.ok) {
            setOcrStatus("本地 OCR 服务已连接");
        }
    } catch {
        setOcrStatus("请通过 run_ocr_web.bat 启动本地 OCR 网页", "warn");
    }
}

checkOcrService();
</script>
</body>
</html>
