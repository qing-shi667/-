<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>牛顿环曲率半径计算与AI回答助手</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: #243142;
      background: #eef3f8;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    .app {
      width: min(1420px, calc(100vw - 28px));
      margin: 14px auto;
      display: grid;
      grid-template-columns: minmax(640px, 1fr) 390px;
      gap: 14px;
      align-items: start;
    }

    .calculator-frame {
      width: 100%;
      height: calc(100vh - 28px);
      min-height: 880px;
      border: 0;
      border-radius: 8px;
      background: #f5f7fa;
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
    }

    .assistant {
      display: grid;
      grid-template-rows: auto auto auto auto;
      gap: 12px;
      padding: 18px;
      border: 1px solid #d9e1ec;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin: 0;
      color: #2c3e50;
      font-size: 22px;
      line-height: 1.35;
    }

    .quick {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      padding: 10px 12px;
      border: 0;
      border-radius: 5px;
      color: #ffffff;
      background: #3498db;
      font: inherit;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #2980b9;
    }

    button.secondary {
      color: #34495e;
      border: 1px solid #d8dee8;
      background: #ffffff;
    }

    button.secondary:hover {
      background: #f1f5f9;
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .chat-log {
      height: 280px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 10px;
      padding: 12px;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      background: #f8fbfe;
    }

    .bubble {
      max-width: 94%;
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      justify-self: end;
      color: #ffffff;
      background: #3498db;
    }

    .bubble.assistant {
      justify-self: start;
      border: 1px solid #d8dee8;
      background: #ffffff;
    }

    .bubble.error {
      color: #a8261f;
      border-color: #f0b5ae;
      background: #fff7f6;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      padding: 10px;
      border: 1px solid #d8dee8;
      border-radius: 5px;
      font: inherit;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 1050px) {
      .app {
        grid-template-columns: 1fr;
      }

      .calculator-frame {
        height: 900px;
      }

      .chat-log {
        height: 240px;
      }

    }
  </style>
</head>
<body>
  <main class="app">
    <iframe
      id="calculatorFrame"
      class="calculator-frame"
      src="calculator-original.html"
      title="牛顿环曲率半径原版计算页"
    ></iframe>

    <section class="assistant" aria-label="AI回答助手">
      <h1>AI回答助手</h1>
      <div class="quick">
        <button class="secondary" type="button" data-question="牛顿环为什么可以测量透镜曲率半径？">实验原理</button>
        <button class="secondary" type="button" data-question="这组数据的主要误差来源有哪些？">误差分析</button>
        <button class="secondary" type="button" data-question="实验报告中最终结果应该怎么写？">报告写法</button>
      </div>
      <div class="chat-log" id="chatLog">
        <div class="bubble assistant">你好，我会结合左侧原版计算页里的数据和结果回答牛顿环曲率半径实验问题。</div>
      </div>
      <textarea id="questionInput" placeholder="例如：为什么要拟合 r² 和环序数 k？"></textarea>
      <div class="actions">
        <button id="sendButton" type="button">发送问题</button>
        <button class="secondary" id="clearChatButton" type="button">清空对话</button>
      </div>
    </section>
  </main>

  <script>
    const chatHistory = [];
    const calculatorFrame = document.getElementById("calculatorFrame");
    const chatLog = document.getElementById("chatLog");
    const questionInput = document.getElementById("questionInput");
    const sendButton = document.getElementById("sendButton");
    const AI_BACKEND_URL = "https://xn--11x61a012f.zeabur.app/api/chat";
    const OCR_BACKEND_URL = AI_BACKEND_URL.replace(/\/api\/chat$/, "/api/ocr");

    sendButton.addEventListener("click", sendQuestion);
    calculatorFrame.addEventListener("load", setupCalculatorOcr);
    if (calculatorFrame.contentDocument?.readyState === "complete") {
      setupCalculatorOcr();
    }
    document.getElementById("clearChatButton").addEventListener("click", () => {
      chatHistory.length = 0;
      chatLog.innerHTML = '<div class="bubble assistant">对话已清空。你可以继续提问。</div>';
    });
    document.querySelectorAll("[data-question]").forEach((button) => {
      button.addEventListener("click", () => {
        questionInput.value = button.dataset.question;
        sendQuestion();
      });
    });
    questionInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
        sendQuestion();
      }
    });

    function collectCalculatorContext() {
      try {
        const doc = calculatorFrame.contentDocument;
        if (!doc) return null;
        return {
          lambda_nm: doc.getElementById("lambda")?.value || "",
          delta_inst_mm: doc.getElementById("deltaInst")?.value || "",
          data_text: doc.getElementById("dataInput")?.value || "",
          result_text: doc.getElementById("result")?.innerText || "",
        };
      } catch (error) {
        return null;
      }
    }

    function fillCalculatorData(dataText) {
      const doc = calculatorFrame.contentDocument;
      const input = doc?.getElementById("dataInput");
      if (!input) throw new Error("没有找到左侧计算页的数据输入框。");
      input.value = dataText;
      const InputEvent = calculatorFrame.contentWindow?.Event || Event;
      input.dispatchEvent(new InputEvent("input", { bubbles: true }));
    }

    function getCalculatorOcrControls() {
      const doc = calculatorFrame.contentDocument;
      return {
        imageInput: doc?.getElementById("ocrImageInput"),
        button: doc?.getElementById("ocrButton"),
        status: doc?.getElementById("ocrStatus"),
      };
    }

    function setOcrStatus(status, message, state = "") {
      if (!status) return;
      status.textContent = message;
      status.className = `ocr-status${state ? ` ${state}` : ""}`;
    }

    function setupCalculatorOcr() {
      const { button } = getCalculatorOcrControls();
      if (!button || button.dataset.ocrBound === "true") return;
      button.dataset.ocrBound = "true";
      button.addEventListener("click", runOcr);
    }

    async function runOcr() {
      const { imageInput, button, status } = getCalculatorOcrControls();
      const file = imageInput?.files?.[0];
      if (!button || button.disabled) return;
      if (!file) {
        setOcrStatus(status, "请先选择一张实验数据图片。", "error");
        return;
      }
      button.disabled = true;
      try {
        setOcrStatus(status, "正在识别图片并由 AI 整理实验数据...");
        const formData = new FormData();
        formData.append("image", file);
        const response = await fetch(OCR_BACKEND_URL, {
          method: "POST",
          body: formData,
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.message || "OCR 识别失败");
        }
        fillCalculatorData(data.data_text);
        const rowCount = data.data_text.split(/\r?\n/).filter((line) => line.trim()).length;
        setOcrStatus(status, `已识别并填入 ${rowCount} 组数据，请核对后手动开始计算。`, "success");
      } catch (error) {
        setOcrStatus(status, error.message, "error");
      } finally {
        button.disabled = false;
      }
    }

    async function sendQuestion() {
      const question = questionInput.value.trim();
      if (!question || sendButton.disabled) return;
      questionInput.value = "";
      appendMessage("user", question);
      chatHistory.push({ role: "user", content: question });
      sendButton.disabled = true;
      try {
        appendMessage("assistant", "正在思考...");
        const loadingBubble = chatLog.lastElementChild;
        const calculation = collectCalculatorContext();
        const messages = [
          {
            role: "system",
            content: "你是牛顿环测透镜曲率半径实验的中文教学助手。回答要准确、简洁，优先解释实验原理、数据处理、误差来源和报告写法。"
          }
        ];
        if (calculation) {
          messages.push({
            role: "system",
            content: "当前网页计算上下文：" + JSON.stringify(calculation).slice(0, 3500)
          });
        }
        chatHistory.slice(-6).forEach((item) => messages.push(item));
        const response = await fetch(AI_BACKEND_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question,
            calculation,
            history: chatHistory,
          }),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || "AI 后端请求失败");
        }
        const answer = data.answer || "";
        if (!answer) throw new Error("DeepSeek 没有返回有效回答。");
        loadingBubble.textContent = answer;
        chatHistory.push({ role: "assistant", content: answer });
      } catch (error) {
        if (chatLog.lastElementChild?.textContent === "正在思考...") {
          chatLog.lastElementChild.remove();
        }
        appendMessage("assistant error", error.message);
      } finally {
        sendButton.disabled = false;
      }
    }

    function appendMessage(type, text) {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${type}`;
      bubble.textContent = text;
      chatLog.appendChild(bubble);
      chatLog.scrollTop = chatLog.scrollHeight;
    }
  </script>
</body>
</html>
