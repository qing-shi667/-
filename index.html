<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>交安眼 - 智能交通视觉处理平台</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="side">
      <div class="brand">
        <div class="brand-mark">JY</div>
        <div>
          <h1>交安眼</h1>
          <p>MCWTT 视觉处理平台</p>
        </div>
      </div>

      <label class="dropzone" id="dropzone">
        <input id="fileInput" type="file" accept="image/*">
        <span class="drop-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 3v10m0-10 4 4m-4-4-4 4M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg>
        </span>
        <strong>导入交通图片</strong>
        <small>支持 JPG / PNG / WebP，本地处理不上传</small>
      </label>

      <section class="panel">
        <div class="panel-head">
          <span>应用场景</span>
        </div>
        <div class="segmented" role="tablist" aria-label="应用场景">
          <button class="active" data-mode="vehicle">车载预警</button>
          <button data-mode="flow">流量监控</button>
          <button data-mode="inspect">道路巡检</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <span>处理模块</span>
          <button id="resetModules" class="icon-btn" title="恢复默认">
            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
          </button>
        </div>
        <label class="toggle">
          <input type="checkbox" id="enhanceLight" checked>
          <span>光照校正</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="frequencyBoost" checked>
          <span>频域感知增强</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="edgeMap" checked>
          <span>边缘 / 病害提取</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="overlayBoxes" checked>
          <span>候选目标框</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="trajectory" checked>
          <span>轨迹与风险叠加</span>
        </label>
      </section>

      <section class="panel compact">
        <label class="range-label" for="sensitivity">
          <span>灵敏度</span>
          <output id="sensValue">62</output>
        </label>
        <input id="sensitivity" type="range" min="20" max="95" value="62">
      </section>

      <div class="actions">
        <button id="processBtn" class="primary-btn">
          <svg viewBox="0 0 24 24"><path d="m12 2 1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8Z"/></svg>
          处理图片
        </button>
        <button id="exportBtn" class="secondary-btn" disabled>
          <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>
          导出结果
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Offline Vision Console</p>
          <h2>智能交通图像分析工作台</h2>
        </div>
        <div class="status-pill">
          <span></span>
          本地离线运行
        </div>
      </header>

      <section class="workspace">
        <div class="viewer">
          <div class="viewer-toolbar">
            <div class="tabs">
              <button class="active" data-view="result">处理结果</button>
              <button data-view="source">原始图像</button>
              <button data-view="split">对比视图</button>
            </div>
            <div id="imageMeta" class="image-meta">等待导入图片</div>
          </div>
          <div class="canvas-wrap" id="canvasWrap">
            <canvas id="mainCanvas" width="1280" height="720"></canvas>
            <div id="emptyState" class="empty-state">
              <div class="radar"></div>
              <h3>导入图片开始分析</h3>
              <p>平台会在本地完成增强、边缘提取、候选框叠加与结果导出。</p>
            </div>
          </div>
        </div>

        <aside class="inspector">
          <section class="metric-hero">
            <span>综合置信度</span>
            <strong id="confidence">--</strong>
            <p id="sceneSummary">导入图片后生成场景分析摘要</p>
          </section>

          <section class="metrics-grid">
            <div>
              <span>目标候选</span>
              <strong id="targetCount">--</strong>
            </div>
            <div>
              <span>边缘密度</span>
              <strong id="edgeDensity">--</strong>
            </div>
            <div>
              <span>风险等级</span>
              <strong id="riskLevel">--</strong>
            </div>
            <div>
              <span>处理耗时</span>
              <strong id="processTime">--</strong>
            </div>
          </section>

          <section class="event-panel">
            <div class="panel-head">
              <span>事件输出</span>
            </div>
            <ol id="eventList">
              <li>等待图片输入</li>
            </ol>
          </section>

          <section class="tech-panel">
            <div class="panel-head">
              <span>技术映射</span>
            </div>
            <ul>
              <li>静态模板：导入图像作为初始观测</li>
              <li>动态模板：高置信区域用于轨迹叠加</li>
              <li>频域思路：高频细节增强与噪声抑制</li>
              <li>输出层：目标框、置信度、轨迹与告警</li>
            </ul>
          </section>
        </aside>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
